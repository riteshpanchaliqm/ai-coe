<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Brain/circuit shape representing AI -->
  <rect width="64" height="64" rx="14" fill="#134AC1"/>
  <!-- Neural network nodes -->
  <circle cx="22" cy="22" r="4" fill="white" opacity="0.9"/>
  <circle cx="42" cy="22" r="4" fill="white" opacity="0.9"/>
  <circle cx="32" cy="36" r="5" fill="white"/>
  <circle cx="20" cy="46" r="3.5" fill="white" opacity="0.8"/>
  <circle cx="44" cy="46" r="3.5" fill="white" opacity="0.8"/>
  <!-- Connections -->
  <line x1="22" y1="26" x2="32" y2="31" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="42" y1="26" x2="32" y2="31" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="41" x2="20" y2="46" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="41" x2="44" y2="46" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="22" y1="22" x2="42" y2="22" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="46" x2="44" y2="46" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Center glow -->
  <circle cx="32" cy="36" r="8" fill="white" opacity="0.1"/>
</svg>
