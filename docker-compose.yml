services:
  aicoe-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_API_BASE_PATH: ${VITE_API_BASE_PATH:-/api/v1/ai-coe}
    container_name: aicoe-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - app-network

  aicoe-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aicoe-backend
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    networks:
      - app-network

networks:
  app-network:
    external: true
